name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: sistem-analizi/ci/.github/workflows/deploy.yml@v1
    with:
      build_type: php
      year: '2026'
      php_version: '8.4'

      # clean_slate: false → diff-based sync. Repodan silinen dosyalar sunucudan
      # silinir, runtime dosyalarına (DB vs.) dokunulmaz.
      clean_slate: false

      # SQLite DB dosyaları runtime'da yaratılır — kazara repoya commit'lense
      # bile asla FTP'ye gitmez ve sunucudaki dolu DB'yi ezmez.
      exclude: |
        *.db
        *.db-journal
        *.db-wal
        *.db-shm

    secrets: inherit
